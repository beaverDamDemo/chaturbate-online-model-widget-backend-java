spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

security:
  jwt:
    secret: ${JWT_SECRET}

admin:
  seed:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
